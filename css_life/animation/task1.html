<!DOCTYPE html>
<html>
<head>
    <title>Solar System</title>
    <link rel="stylesheet" href="task1.css">
</head>

<body>

<h1>Solar System Animation</h1>

<div class="solar">

    <div class="sun"></div>

    <div class="orbit mercury">
        <div class="planet mercury-color"></div>
    </div>

    <div class="orbit venus">
        <div class="planet venus-color"></div>
    </div>

    <div class="orbit earth">
        <div class="planet earth-color"></div>
    </div>

    <div class="orbit mars">
        <div class="planet mars-color"></div>
    </div>

    <div class="orbit jupiter">
        <div class="planet jupiter-color"></div>
    </div>

    <div class="orbit saturn">
        <div class="planet saturn-color"></div>
    </div>

    <div class="orbit uranus">
        <div class="planet uranus-color"></div>
    </div>

    <div class="orbit neptune">
        <div class="planet neptune-color"></div>
    </div>

</div>

</body>
</html>
