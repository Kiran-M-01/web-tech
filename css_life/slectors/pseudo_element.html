<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1:first-letter {
            color : red;
            font-size : 150px;
        } 
        /*p:first-line {
            color : red;
            
        }*/
        h2:before{
            content: url("https://images.unsplash.com/photo-1781456651358-9b627372d6cf?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw3fHx8ZW58MHx8fHx8")
            
        }
        h2::after{
            content : "hello";
            color: blue;
        }

        p::selection{
            color: blue;
            background-color: yellow;
        }

        li::marker{
            content : "😎";
        }

        input::placeholder{
            color:aqua;
        }
        

    </style>
</head>
<body>
    <h1>heading 1</h1>
    <h2>heading 2</h2>
    <!-- <p>lorem ----------------------------------------------------------------------------------------------------------
    </p> -->
    <p>afddfafadsgsdgsd</p>

    <ul>
        <li>this is list 1</li>
        <li>this is list 2</li>
        <li>this is list 3</li>
        <li>this is list 4</li>
    </ul>
    <input type="text" placeholder="enter name">
</body>
</html>
